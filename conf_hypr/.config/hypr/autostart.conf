# Personal autostart — runs alongside Omarchy's default autostart.
# Omarchy already starts hypridle, swaybg, polkit, mako, waybar, etc.

# Dynamic wallpaper daemon (awww replaces Omarchy's swaybg for this session)
exec-once = awww-daemon

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Brain_Shell (bar, widgets, launcher, notifications)
exec-once = ~/.config/hypr/scripts/qs_run.sh -p ~/.config/Brain_Shell

# Quickshell lockscreen service
exec-once = ~/.config/hypr/scripts/qs_run.sh -p ~/.config/quickshell

# Random wallpaper on reload
exec-once = ~/.config/hypr/scripts/random-paper-hypr.sh

# Disable fcitx5 (IME prediction popup) which is started by OMarchy
exec-once = sleep 2 && killall fcitx5
