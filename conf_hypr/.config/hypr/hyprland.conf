#############################
######### VARIABLES #########
#############################

env = WLR_NO_HARDWARE_CURSORS,1
env = QT_QPA_PLATFORM,wayland;xcb
env = GDK_BACKEND,wayland,x11
env = XCURSOR_SIZE,24
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

$mod = SUPER
$left = h
$down = j
$up = k
$right = l
$polkit = /usr/bin/lxpolkit
$notification_daemon = dunst

###################
### MY PROGRAMS ###
###################

$term = $HOME/.local/kitty.app/bin/kitty
$fileManager = thunar
$launcher = ~/.config/rofi/launchers/type-1/launcher.sh

#################
### AUTOSTART ###
#################

exec-once = swww-daemon
exec-once = hypridle
exec-once = $polkit
exec-once = $notification_daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = nixGLIntel quickshell

exec = ~/.config/hypr/scripts/random-paper-hypr.sh
exec = ~/.config/hypr/scripts/waybar_hover.sh

################
### MONITORS ###
################

# monitor = HDMI-A-1, 1920x1080@120, 0x0, 1
monitor = HDMI-A-1, 1920x1080@60, 0x0, 1
monitor = eDP-1, 1366x768@60, auto, 1
monitor = , preferred, auto, 1

#############
### INPUT ###
#############

input {
  kb_layout = us
  kb_variant = intl
  follow_mouse = 1
  touchpad {
    disable_while_typing = true
  }
  sensitivity = 0
}

#####################
### LOOK AND FEEL ###
#####################
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = blur on, match:namespace qs-master
layerrule = ignore_alpha 0, match:namespace qs-master
layerrule = blur on, match:namespace qs-popups
layerrule = ignore_alpha 0, match:namespace qs-popups
layerrule = blur on, match:namespace qs-floating-overlay
layerrule = ignore_alpha 0, match:namespace qs-floating-overlay

general {
  gaps_in = 1
  gaps_out = 3
  border_size = 1
  col.active_border = rgb(298DFF) rgb(9A47FF) 45deg
  col.inactive_border = rgba(00000000)
  layout = dwindle
}

decoration {
  rounding = 8
  active_opacity = 0.85
  inactive_opacity = 0.5
  shadow {
    enabled = true
    range = 6
    color = rgb(52d9ff)
    color_inactive = rgba(00000000)
  }
  blur {
    enabled = true
    size = 1
    passes = 3
    noise = 0.0
    brightness = 0.7
  }
}

animations {
  enabled = true

  bezier = smooth, 0.05, 0.9, 0.1, 1.0
  bezier = linear, 0.0, 0.0, 1.0, 1.0

  animation = windows, 1, 3, smooth, popin 80%
  animation = windowsOut, 1, 2, smooth, popin 80%
  
  animation = border, 0, 3, default 
  
  animation = fadeIn, 1, 2, smooth
  animation = fadeOut, 1, 2, smooth
  animation = fade, 1, 2, smooth
  
  animation = layers, 1, 3, smooth, fade
  animation = layersIn, 1, 3, smooth, fade
  animation = layersOut, 1, 2, smooth, fade
  
  animation = workspaces, 1, 2.5, smooth, slide
  
  animation = specialWorkspace, 1, 3, smooth, slidevert
}

####################
### WINDOW RULES ###
####################
workspace = 1, monitor:HDMI-A-1, default:true
workspace = 2, monitor:HDMI-A-1
workspace = 3, monitor:HDMI-A-1
workspace = 4, monitor:HDMI-A-1
workspace = 5, monitor:HDMI-A-1
workspace = 6, monitor:eDP-1, default:true

workspace = w[tv1], gapsout:3, gapsin:1, shadow:false
workspace = f[1], gapsout:3, gapsin:1, shadow:false

windowrule = border_size 0, rounding 8, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, rounding 8, match:float 0, match:workspace f[1]

windowrule = size (monitor_w*0.50) (monitor_h*0.95), center on, match:class .*

# thunar
windowrule = float on, center on, size (monitor_w*0.60) (monitor_h*0.95), match:class ^(thunar)$

# Pavucontrol & Calculator
windowrule = float on, center on, size (monitor_w*0.50) (monitor_h*0.95), match:class ^(pavucontrol)$
windowrule = float on, center on, size (monitor_w*0.25) (monitor_h*0.70), match:class ^(org.gnome.Calculator)$

###################
### KEYBINDINGS ###
###################
bind = $mod SHIFT, R, exec, ~/.config/rofi/scripts/record/record.sh
bind = $mod SHIFT, C, exec, hyprctl reload #reload hypr config
bind = $mod, Return, exec, $term # terminal
bind = $mod, E, exec, $fileManager # file manager
bind = $mod, space, exec, $launcher # app launcher
bind = $mod, G, exec, ~/.config/rofi/scripts/goanime/goanime.sh # goanime
bind = ALT, F4, killactive, # kill window
bind = $mod SHIFT, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/scripts/clipboard/style.rasi | cliphist decode | wl-copy # clipboard
bind = $mod SHIFT ALT, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/scripts/clipboard/style.rasi | cliphist delete
bind = $mod ALT, L, exec, loginctl lock-session # screen lock
bind = $mod, P, exec, playerctl play-pause

# scripts
bind = $mod SHIFT, E, exec, ~/.config/rofi/powermenu/type-4/powermenu.sh

# screenshot
bind = $mod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot-area.sh
bind = $mod SHIFT ALT, S, exec, ~/.config/hypr/scripts/screenshot-all.sh

# window
bind = $mod, f, togglefloating # float
bind = ALT, Escape, focuscurrentorlast

bind = $mod, $left, movefocus, l
bind = $mod, $down, movefocus, d
bind = $mod, $up, movefocus, u
bind = $mod, $right, movefocus, r
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

bind = $mod SHIFT, $left, movewindow, l
bind = $mod SHIFT, $down, movewindow, d
bind = $mod SHIFT, $up, movewindow, u
bind = $mod SHIFT, $right, movewindow, r
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

bind = CTRL ALT, $left, workspace, -1
bind = CTRL ALT, $right, workspace, +1
bind = CTRL ALT, Left, workspace, -1
bind = CTRL ALT, Right, workspace, +1

bind = CTRL ALT SHIFT, $left, movetoworkspace, -1
bind = CTRL ALT SHIFT, $right, movetoworkspace, +1
bind = CTRL ALT SHIFT, Left, movetoworkspace, -1
bind = CTRL ALT SHIFT, Right, movetoworkspace, +1

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# special workspace (scratchpad)
bind = $mod, MINUS, togglespecialworkspace, magic
bind = $mod SHIFT, MINUS, movetoworkspace, special:magic
bind = $mod SHIFT, EQUAL, movetoworkspace, e+0

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Increase the WIDTH by 50 pixels
binde = $mod CTRL, $right, resizeactive, 50 0
# Decrease the WIDTH by 50 pixels
binde = $mod CTRL, $left, resizeactive, -50 0
# Increase the HEIGHT by 50 pixels
binde = $mod CTRL, $up, resizeactive, 0 -50
# Decrease the HEIGHT by 50 pixels
binde = $mod CTRL, $down, resizeactive, 0 50

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 2 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume -l 2 @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 10%-
bindel = ,XF86AudioPlay, exec, playerctl play-pause
