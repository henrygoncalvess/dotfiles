#############################
######### VARIABLES #########
#############################

$mod = SUPER
$left = h
$down = j
$up = k
$right = l
$lockbg = $HOME/Documents/wallpapers/lock/lemon.jpg
$polkit = /usr/bin/lxpolkit
$notification_daemon = mako

###################
### MY PROGRAMS ###
###################

$term = $HOME/.local/kitty.app/bin/kitty
$fileManager = nautilus
$launcher = ~/.config/rofi/launchers/type-1/launcher.sh

#################
### AUTOSTART ###
#################

exec-once = $polkit
exec-once = $notification_daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = dbus-update-activation-environment --systemd DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swayidle -w \
  timeout 90 'swaylock -f -i $lockbg -s fill' \
  timeout 120 'hyprctl dispatch dpms off' \
  resume 'hyprctl dispatch dpms on'

exec = ~/.config/waybar/scripts/update-waybar.sh
exec = ~/.config/hypr/scripts/random-paper-hypr.sh

################
### MONITORS ###
################

monitor = LVDS-1, disable 
monitor = HDMI-A-1, 1366x768@60, auto,1

#############
### INPUT ###
#############

input {
  kb_layout = us
  kb_variant = intl
  follow_mouse = 1
  touchpad {
    disable_while_typing = true
  }
  sensitivity = 0
}

#####################
### LOOK AND FEEL ###
#####################

general {
  gaps_in = 1
  gaps_out = 3
  border_size = 2
  col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
  col.inactive_border = rgb(1a1a1a)
  layout = dwindle
}

decoration {
  rounding = 8
  active_opacity = 0.95
  inactive_opacity = 0.85
}

animations {
  enabled = true
  bezier = easeOutQuint, 0.23, 1, 0.32, 1
  animation = global, 1, 1.7, easeOutQuint
}

# windowrule = float, rofi

###################
### KEYBINDINGS ###
###################

bind = $mod SHIFT, C, exec, hyprctl reload

bind = $mod, Return, exec, $term
bind = $mod, E, exec, $fileManager
bind = $mod, space, exec, $launcher
bind = ALT, space, exec, $menur
bind = ALT, F4, killactive,
bind = $mod SHIFT, V, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/scripts/clipboard/style.rasi | cliphist decode | wl-copy
bind = $mod ALT SHIFT, L, exec, swaylock -i $lockbg -s fill

bind = $mod, b, layoutmsg, orientation horizontal
bind = $mod, v, layoutmsg, orientation vertical
bind = $mod, f, togglefloating
bind = ALT, Escape, focuscurrentorlast

bind = $mod, $left, movefocus, l
bind = $mod, $down, movefocus, d
bind = $mod, $up, movefocus, u
bind = $mod, $right, movefocus, r
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

bind = $mod SHIFT, $left, movewindow, l
bind = $mod SHIFT, $down, movewindow, d
bind = $mod SHIFT, $up, movewindow, u
bind = $mod SHIFT, $right, movewindow, r
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

bind = CTRL ALT, $left, workspace, -1
bind = CTRL ALT, $right, workspace, +1
bind = CTRL ALT, Left, workspace, -1
bind = CTRL ALT, Right, workspace, +1

bind = CTRL ALT SHIFT, $left, movetoworkspace, -1
bind = CTRL ALT SHIFT, $right, movetoworkspace, +1
bind = CTRL ALT SHIFT, Left, movetoworkspace, -1
bind = CTRL ALT SHIFT, Right, movetoworkspace, +1

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# special workspace (scratchpad)
bind = $mod, MINUS, togglespecialworkspace, magic
bind = $mod SHIFT, MINUS, movetoworkspace, special:magic

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Increase the WIDTH by 50 pixels
bind = $mod CTRL, L, exec, hyprctl dispatch resizewindow 50 0
# Decrease the WIDTH by 50 pixels
bind = $mod CTRL, H, exec, hyprctl dispatch resizewindow -50 0
# Increase the HEIGHT by 50 pixels
bind = $mod CTRL, K, exec, hyprctl dispatch resizewindow 0 50
# Decrease the HEIGHT by 50 pixels
bind = $mod CTRL, J, exec, hyprctl dispatch resizewindow 0 -50


# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 10%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 10%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 10%-
