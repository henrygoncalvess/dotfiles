general {
    disable_loading_bar = true
    hide_cursor = false
}

# FUNDO COM BLUR
background {
    monitor =
    path = screenshot
    color = rgba(0, 0, 0, 0)
    blur_passes = 1
    blur_size = 4
    noise = 0
    contrast = 1
    brightness = 1
    vibrancy = 0
    vibrancy_darkness = 0.0
}

# Day
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 100
    font_family = Hasklug Nerd Font Mono Bold
    position = 0, 350
    halign = center
    valign = center
}

# Date-Month
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%d %B, %Y")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 40
    font_family = SF Pro Display Bold
    position = 0, 250
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"- %I:%M:%S%p -")</span>"
    color = rgba(255, 255, 255, 0.7)
    font_size = 20
    font_family = SF Pro Display Bold
    position = 0, 190
    halign = center
    valign = center
}

# Profie-Photo
image {
    monitor =
    path = $HOME/.face.jpeg
    border_size = 2
    color = rgba(255, 255, 255, 0.7)
    size = 230
    rounding = -1
    rotate = 0
    reload_time = -1
    reload_cmd = 
    position = 0, 20
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hi, $USER
    color = rgba(255, 255, 255, 0.7)
    font_size = 25
    font_family = SF Pro Display Bold
    position = 0, -160
    halign = center
    valign = center
}

# PASSWORD
input-field {
    monitor =
    size = 250, 40
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(255, 255, 255, 0.1)
    inner_color = rgba(0, 0, 0, 0.3)
    font_color = rgba(255, 255, 255, 0.8)
    fade_on_empty = true
    hide_input = false
    position = 0, -230
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/scripts/songdetail.sh)" 
    color = rgba(255, 255, 255, 0.7)
    font_size = 18
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 120
    halign = center
    valign = bottom
}

# UPTIME
label {
    monitor =
    text = cmd[update:60000] echo "<b>Uptime:</b> $(uptime -p | sed 's/up //')"
    color = rgba(255, 255, 255, 0.4)
    font_size = 12
    font_family = JetBrains Mono Nerd Font
    position = 0, 20
    halign = center
    valign = bottom
}
