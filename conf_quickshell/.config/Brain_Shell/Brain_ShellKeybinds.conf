# ==============================================================================
# Brain Shell Keybinds
# Auto-generated by Quickshell. Do not edit manually.
# ==============================================================================

# ==============================================================================
# BrainShell Capture Submap (Disables all normal binds during recording)
# ==============================================================================
submap = BrainShell_clean
bind = CTRL, ESCAPE, exec, notify-send 'BrainShell' 'Emergency Exit: Keybinds re-enabled.'
bind = CTRL, ESCAPE, submap, reset
submap = reset

# ==============================================================================
# User Defined Bindings
# ==============================================================================

# Dashboard
bind = SUPER, D, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call dashboard-home toggle
bind = CTRL SHIFT, ESCAPE, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call dashboard-stats toggle
bind = SUPER, Z, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call dashboard-kanban toggle
bind = SUPER, Q, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call dashboard-launcher toggle
bind = SUPER, C, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call dashboard-config toggle

# Popups
bind = SUPER, ESCAPE, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call PowerMenu-toggle toggle
bind = SUPER, N, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call notification-toggle toggle
bind = SUPER, W, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call wallpaper-toggle toggle
bind = SUPER, V, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call clipboard-toggle toggle

# Network Tabs
bind = SUPER ALT, W, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call wifi-toggle toggle
bind = SUPER ALT, B, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call bluetooth-toggle toggle
bind = SUPER ALT, G, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call vpn-toggle toggle
bind = SUPER ALT, H, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call hotspot-toggle toggle

# Audio Tabs
bind = SUPER, A, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call audioOut-toggle toggle
bind = SUPER ALT, I, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call audioIn-toggle toggle
bind = SUPER, M, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call audioMix-toggle toggle

# Quick Settings
bind = SUPER, B, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call focus-toggle toggle
bind = ALT, F9, exec, qs ipc -c /home/henrygoncalves/.config/Brain_Shell call screenrec-on toggle
